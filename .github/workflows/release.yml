name: Release Dix

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build y publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Dix ${{ github.ref_name }}
          releaseBody: |
            ## Dix ${{ github.ref_name }}

            La primera AppIA del Mundo — optimiza tu sistema Linux con IA real.

            ### Instalar (.deb)
            ```
            sudo dpkg -i Dix_*_amd64.deb
            ```
            O usa el **AppImage** para ejecución directa sin instalación.

            ### Actualizar
            Si ya tienes Dix instalado, la app detecta esta versión automáticamente y te ofrece actualizar con un clic.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: false

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build y publicar release Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Dix ${{ github.ref_name }}
          releaseBody: |
            ## Dix ${{ github.ref_name }}

            La primera AppIA del Mundo — optimiza tu sistema Windows con IA real.

            ### Instalar (.msi)
            Descarga `Dix_*.msi` y ejecuta como Administrador.

            ### Instalar (NSIS .exe)
            Descarga `Dix_*_x64-setup.exe` para instalación guiada.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
