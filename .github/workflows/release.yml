name: Release Dix

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Linux: crea el Release y sube .deb / .AppImage / .rpm ─────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dependencias sistema Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: cargo check Linux
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - run: npm ci

      - name: Build y publicar release Linux
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dix ${{ github.ref_name }}"
          releaseBody: |
            ## Dix ${{ github.ref_name }}

            **La primera AppIA del Mundo** — optimiza tu PC con IA real en segundos.

            ---

            ### Linux
            | Formato | Comando |
            |---------|---------|
            | `.deb` (Ubuntu/Debian) | `sudo dpkg -i Dix_*_amd64.deb` |
            | `.AppImage` | `chmod +x Dix_*.AppImage && ./Dix_*.AppImage` |
            | `.rpm` (Fedora/RHEL) | `sudo rpm -i Dix_*.rpm` |

            ### Windows
            | Formato | Descripción |
            |---------|-------------|
            | `Dix_*_x64-setup.exe` | Instalador NSIS — recomendado |
            | `Dix_*_x64_en-US.msi` | MSI — para despliegue empresarial |

            > Ejecuta el instalador Windows **como Administrador** para que DIX pueda aplicar optimizaciones de sistema.

            ---

            **dixsystem.com** · [Discord](https://discord.gg/dixsystem)
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: false

  # ── Windows: espera al job Linux para evitar race condition en el Release ──
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    needs: build-linux
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check Windows
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

      - run: npm ci

      - name: Build y subir binarios Windows al Release existente
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dix ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          updaterJsonPreferNsis: true
