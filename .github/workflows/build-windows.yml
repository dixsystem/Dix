name: Build Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (x86_64-msvc)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm install
        run: npm install

      - name: Build Tauri (Windows MSVC)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Subir instalador NSIS (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: dix-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Subir instalador MSI (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: dix-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14
